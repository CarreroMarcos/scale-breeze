upstream feed_service {
    server api:8000;
}

upstream event_service {
    server events:8081;
}

# HTTP Redirect to HTTPS
server {
    listen 80;
    server_name localhost;
    
    location / {
        return 301 https://$host:8889$request_uri;
    }

    # Internal health check for Nginx remains on port 80 (local only)
    location /nginx_health {
        access_log off;
        return 200 "healthy\n";
    }
}

# HTTPS Server
server {
    listen 443 ssl;
    server_name localhost;

    # SSL Configuration
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none';" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting applied globally
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    # JSON error responses
    error_page 429 /429.json;
    error_page 502 /502.json;
    error_page 504 /504.json;

    location = /429.json {
        return 429 '{"error": "Too Many Requests", "status": 429}';
    }
    location = /502.json {
        return 502 '{"error": "Bad Gateway", "status": 502}';
    }
    location = /504.json {
        return 504 '{"error": "Gateway Timeout", "status": 504}';
    }

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    add_header X-Request-ID $request_id;

    # Routing
    location ~ ^/posts/? {
        proxy_pass http://feed_service;
    }

    location /events {
        proxy_pass http://event_service;
    }
}
