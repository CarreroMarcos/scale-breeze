upstream feed_service {
    server api:8000;
}

upstream event_service {
    server events:8081;
}

# HTTP Redirect to HTTPS
server {
    listen 80;
    server_name localhost;
    
    location / {
        return 301 https://$host:8889$request_uri;
    }

    # Internal health check for Nginx remains on port 80 (local only)
    location /nginx_health {
        access_log off;
        return 200 "healthy\n";
    }
}

# HTTPS Server
server {
    listen 443 ssl;
    server_name localhost;

    # SSL Configuration
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Rate limiting applied globally
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    # JSON error responses
    error_page 429 /429.json;
    error_page 502 /502.json;
    error_page 504 /504.json;

    location = /429.json {
        return 429 '{"error": "Too Many Requests", "status": 429}';
    }
    location = /502.json {
        return 502 '{"error": "Bad Gateway", "status": 502}';
    }
    location = /504.json {
        return 504 '{"error": "Gateway Timeout", "status": 504}';
    }

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Routing
    location ~ ^/posts/? {
        proxy_pass http://feed_service;
    }

    location /events {
        proxy_pass http://event_service;
    }
}
