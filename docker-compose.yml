services:
  db:
    image: postgres:16-alpine
    container_name: scalebreeze-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_SUPERUSER_PASSWORD:-postgres}
      POSTGRES_DB: scalebreeze
      # App-specific user for better isolation
      APP_DB_USER: ${DB_USER:-sb_app}
      APP_DB_PASS: ${DB_PASSWORD:-sb_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - scalebreeze-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scalebreeze"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: scalebreeze-redis
    restart: always
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    networks:
      - scalebreeze-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  kafka:
    image: apache/kafka:3.7.0
    container_name: scalebreeze-kafka
    restart: always
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - scalebreeze-net
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: scalebreeze-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-sb_app}:${DB_PASSWORD:-sb_password}@db:5432/scalebreeze
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - scalebreeze-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  events:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: scalebreeze-events
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - scalebreeze-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  nginx:
    image: nginx:alpine
    container_name: scalebreeze-nginx
    restart: always
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    ports:
      - "8888:80"
      - "8889:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - /var/log/nginx
    depends_on:
      - api
    networks:
      - scalebreeze-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

networks:
  scalebreeze-net:
    name: scalebreeze-net
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
